<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eventos</title>
    <link rel="stylesheet" href="/Front/login/login.css">
    <script src="/Front/api-config.js"></script>
</head>

<body>
    <div class="header">
        <div class="header__logo">
            <img class="header__logo-image" src="/Front/imagens/portalsale.png" alt="Logo Salesiano">
            <h1 class="header__logo-title">Portal Salê</h1>
        </div>
    </div>

    <div class="login">
        <h2 class="login__title">Login</h2>
        <input type="text" id="matricula" class="login__input" placeholder="Número de Matrícula" required>
        <input type="password" id="senha" class="login__input" placeholder="Senha" required>
        <button class="login__button" id="loginButton">Entrar</button>
        <div class="login__forgot-password" onclick="window.location.href='/Front/cadastroUsuarios/CadastroUsuarios.html'">Não tem uma conta? Cadastre-se</div>
        <div class="login__forgot-password" id="forgotPassword">Esqueci minha senha</div>
    </div>

    <div class="main">
        <h2 class="main__title">Bem-vindo ao Portal de Eventos</h2>
        <div class="dashboard">
            <div class="dashboard__card events-preview">
                <div class="events-preview__header">
                    <h3 class="events-preview__title">Eventos Disponíveis</h3>
                </div>
                <p class="events-preview__description">
                    Explore nossa programação completa de eventos, palestras e workshops.
                </p>
                <div class="events-preview__calendar">
                    <div class="calendar-widget" id="calendarWidget">
                        <div class="calendar-widget__header">
                            <span id="calendarMonthYear">Maio 2026</span>
                        </div>
                        <div class="calendar-widget__grid" id="calendarGrid"></div>
                    </div>
                </div>
                <button class="events-preview__button" id="calendarIcon">
                    <span>Ver Todos os Eventos</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>

            <div class="dashboard__card quick-actions">
                <h3 class="quick-actions__title">Ações Rápidas</h3>
                <div class="quick-actions__grid">

                    <!-- Certificados -->
                    <button class="quick-action">
                        <i class="fas fa-certificate"></i>
                        <span>Certificados</span>
                    </button>

                    <!-- Histórico -->
                    <button class="quick-action" id="historyButton">
                        <i class="fas fa-history"></i>
                        <span>Histórico</span>
                    </button>

                    <!-- Sair -->
                    <button class="quick-action" id="logoutButton">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Sair</span>
                    </button>

                </div>
            </div>

        </div>
    </div>

    <script src="/Front/login/login.js"></script>
</body>

</html>
